    <text x="0" y="146" fill="#fffdf8" font-family="Georgia, Noto Serif TC, Microsoft JhengHei, serif" font-size="70" font-weight="800">線圈裡的</text>
    <text x="0" y="226" fill="#f59f00" font-family="Georgia, Noto Serif TC, Microsoft JhengHei, serif" font-size="82" font-weight="800">小火車</text>
    <rect x="0" y="262" width="420" height="3" fill="#486581"/>
    <text x="0" y="315" fill="#d9e2ec" font-family="Arial, Microsoft JhengHei, sans-serif" font-size="28">從一顆電池，看懂</text>
    <text x="0" y="362" fill="#ffffff" font-family="Arial, Microsoft JhengHei, sans-serif" font-size="31" font-weight="800">電流 × 磁場 × 力</text>
    <g transform="translate(0 423)" font-family="Arial, Microsoft JhengHei, sans-serif" font-size="21" font-weight="700">
      <rect width="142" height="52" rx="26" fill="#0b7285"/><text x="71" y="34" text-anchor="middle" fill="white">互動模型</text>
      <rect x="154" width="142" height="52" rx="26" fill="#334e68" stroke="#627d98"/><text x="225" y="34" text-anchor="middle" fill="white">證據闖關</text>
      <rect x="308" width="142" height="52" rx="26" fill="#334e68" stroke="#627d98"/><text x="379" y="34" text-anchor="middle" fill="white">安全實作</text>
    </g>
