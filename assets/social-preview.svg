      <rect x="276" y="0" width="66" height="118" rx="17" fill="#334e68"/>
      <rect x="284" y="9" width="25" height="100" rx="8" fill="#2563eb"/>
      <rect x="309" y="9" width="25" height="100" rx="8" fill="#ef4444"/>
