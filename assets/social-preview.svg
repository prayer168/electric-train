<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">線圈裡的小火車社群預覽圖</title>
  <desc id="desc">深藍色背景上，右側是位於銅線圈中的電池與磁鐵小火車，左側標示電與磁互動教材。</desc>
  <defs>
    <linearGradient id="bg-social" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#102a43"/>
      <stop offset="1" stop-color="#243b53"/>
    </linearGradient>
    <linearGradient id="metal-social" x1="0" x2="1">
      <stop stop-color="#bcccdc"/>
      <stop offset=".5" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#9fb3c8"/>
    </linearGradient>
    <filter id="shadow-social" x="-20%" y="-30%" width="140%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#071b2d" flood-opacity=".45"/>
    </filter>
    <marker id="arrow-social" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0 0v8l11-4z" fill="#fbbf24"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-social)"/>
  <circle cx="1070" cy="-20" r="250" fill="#0b7285" opacity=".13"/>
  <circle cx="1030" cy="680" r="280" fill="#f59f00" opacity=".09"/>
